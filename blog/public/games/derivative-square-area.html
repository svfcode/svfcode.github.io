<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Квадрат: площадь и приращение</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a1a; font-family: system-ui, sans-serif; padding: 12px; color: #e5e7eb; font-size: 13px; }
    .wrap { display: flex; flex-wrap: wrap; gap: 16px; align-items: flex-start; }
    .diagram { flex: 1; min-width: 200px; }
    .diagram svg { width: 100%; max-width: 240px; height: auto; display: block; }
    .caption { margin-top: 8px; color: #9ca3af; font-size: 12px; line-height: 1.5; }
    .controls { margin-bottom: 8px; }
    .controls label { color: #9ca3af; margin-right: 8px; }
    .controls input { width: 60px; padding: 4px 8px; background: #111827; border: 1px solid #374151; border-radius: 4px; color: #e5e7eb; }
  </style>
</head>
<body>
  <div class="controls">
    <label>x =</label>
    <input type="number" id="xVal" value="3" min="1" max="6" step="0.5">
    <label style="margin-left: 12px;">Δx =</label>
    <input type="number" id="dxVal" value="0.5" min="0.1" max="2" step="0.1">
  </div>
  <div class="wrap">
    <div class="diagram">
      <svg id="svg" viewBox="0 0 170 170" xmlns="http://www.w3.org/2000/svg">
        <!-- grid scale: 20 units = 80px, so 1 unit ≈ 4px -->
        <rect id="base" x="20" y="20" width="60" height="60" fill="#3b82f6" opacity="0.7" stroke="#60a5fa" stroke-width="2"/>
        <rect id="right" x="80" y="20" width="10" height="60" fill="#4ade80" opacity="0.8" stroke="#22c55e" stroke-width="1.5"/>
        <rect id="top" x="20" y="0" width="60" height="10" fill="#4ade80" opacity="0.8" stroke="#22c55e" stroke-width="1.5"/>
        <rect id="corner" x="80" y="0" width="10" height="10" fill="#f59e0b" opacity="0.9" stroke="#f97316" stroke-width="1.5"/>
        <text id="lblX" x="48" y="55" font-size="14" fill="#e5e7eb" text-anchor="middle" font-weight="500">x</text>
        <text id="lblX2" x="48" y="70" font-size="10" fill="#9ca3af" text-anchor="middle">x</text>
        <text id="lblDxR" x="93" y="52" font-size="10" fill="#22c55e" text-anchor="middle">Δx</text>
        <text id="lblDxT" x="48" y="5" font-size="10" fill="#22c55e" text-anchor="middle">Δx</text>
        <text id="lblArea1" x="93" y="75" font-size="9" fill="#9ca3af" text-anchor="middle">x·Δx</text>
        <text id="lblArea2" x="48" y="-2" font-size="9" fill="#9ca3af" text-anchor="middle">x·Δx</text>
        <text id="lblArea3" x="93" y="5" font-size="9" fill="#9ca3af" text-anchor="middle">(Δx)²</text>
      </svg>
      <p class="caption" id="cap1">Исходный квадрат: площадь x². При увеличении стороны на Δx добавляется два прямоугольника x·Δx и малый квадрат (Δx)².</p>
    </div>
    <div class="diagram">
      <div style="background: #111827; padding: 12px; border-radius: 8px; border: 1px solid #374151;">
        <p style="margin-bottom: 8px;"><strong>Площадь A(x) = x²</strong></p>
        <p style="margin-bottom: 4px;">ΔA = (x+Δx)² − x² = 2x·Δx + (Δx)²</p>
        <p style="margin-bottom: 8px; color: #9ca3af;">При малом Δx: ΔA ≈ 2x·Δx</p>
        <p><strong>Производная:</strong> A'(x) = <span id="deriv">2x</span></p>
        <p id="nums" style="margin-top: 8px; font-size: 12px; color: #4ade80;"></p>
      </div>
      <p class="caption">Чем больше x, тем больше «полосы» 2x·Δx при том же Δx — производная растёт.</p>
    </div>
  </div>
  <script>
    const sx = 15, sy = 15;
    const unit = 18;

    function update() {
      const x = parseFloat(document.getElementById('xVal').value) || 3;
      const dx = parseFloat(document.getElementById('dxVal').value) || 0.5;
      const baseSize = x * unit;
      const dxSize = Math.max(6, dx * unit);

      document.getElementById('base').setAttribute('x', sx);
      document.getElementById('base').setAttribute('y', sy + dxSize);
      document.getElementById('base').setAttribute('width', baseSize);
      document.getElementById('base').setAttribute('height', baseSize);

      document.getElementById('top').setAttribute('x', sx);
      document.getElementById('top').setAttribute('y', sy);
      document.getElementById('top').setAttribute('width', baseSize);
      document.getElementById('top').setAttribute('height', dxSize);

      document.getElementById('right').setAttribute('x', sx + baseSize);
      document.getElementById('right').setAttribute('y', sy + dxSize);
      document.getElementById('right').setAttribute('width', dxSize);
      document.getElementById('right').setAttribute('height', baseSize);

      document.getElementById('corner').setAttribute('x', sx + baseSize);
      document.getElementById('corner').setAttribute('y', sy);
      document.getElementById('corner').setAttribute('width', dxSize);
      document.getElementById('corner').setAttribute('height', dxSize);

      document.getElementById('lblX').setAttribute('x', sx + baseSize/2);
      document.getElementById('lblX').setAttribute('y', sy + dxSize + baseSize/2 - 6);
      document.getElementById('lblX2').setAttribute('x', sx + baseSize/2);
      document.getElementById('lblX2').setAttribute('y', sy + dxSize + baseSize/2 + 6);

      document.getElementById('lblDxT').setAttribute('x', sx + baseSize/2);
      document.getElementById('lblDxT').setAttribute('y', sy + dxSize/2 + 4);
      document.getElementById('lblDxR').setAttribute('x', sx + baseSize + dxSize/2);
      document.getElementById('lblDxR').setAttribute('y', sy + dxSize + baseSize/2 - 4);

      document.getElementById('lblArea2').setAttribute('x', sx + baseSize/2);
      document.getElementById('lblArea2').setAttribute('y', sy - 4);
      document.getElementById('lblArea1').setAttribute('x', sx + baseSize + dxSize/2);
      document.getElementById('lblArea1').setAttribute('y', sy + dxSize + baseSize/2 + 10);
      document.getElementById('lblArea3').setAttribute('x', sx + baseSize + dxSize/2);
      document.getElementById('lblArea3').setAttribute('y', sy + dxSize/2 - 2);

      document.getElementById('deriv').textContent = '2x = ' + (2*x).toFixed(1);
      const da = 2*x*dx + dx*dx;
      document.getElementById('nums').textContent = `При x=${x}, Δx=${dx}: ΔA=${da.toFixed(2)}, ΔA/Δx=${(da/dx).toFixed(2)}`;
    }

    document.getElementById('xVal').addEventListener('input', update);
    document.getElementById('dxVal').addEventListener('input', update);
    update();
  </script>
</body>
</html>
