<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Производная — графики</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a1a; color: #e0e0e0; font-family: system-ui, sans-serif; padding: 12px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
    .chart { width: 100%; max-width: 500px; }
    .caption { font-size: 13px; margin-top: 8px; opacity: 0.85; text-align: center; }
    svg { display: block; width: 100%; height: auto; }
  </style>
</head>
<body>
  <div class="chart">
    <svg viewBox="0 0 320 160" xmlns="http://www.w3.org/2000/svg">
      <g stroke="#333" stroke-width="0.5" opacity="0.6">
        <line x1="50" y1="20" x2="50" y2="140"/>
        <line x1="50" y1="80" x2="300" y2="80"/>
      </g>
      <g stroke="#666" stroke-width="1">
        <line x1="50" y1="20" x2="50" y2="140"/>
        <line x1="50" y1="80" x2="300" y2="80"/>
      </g>
      <!-- y = 3x - 1: (0,-1)->(50,115), (5,14)->(90,58), (10,29)->(130,1). 8px/ед.x, 4px/ед.y -->
      <line x1="34" y1="134" x2="290" y2="-70" stroke="#60a5fa" stroke-width="2"/>
      <circle cx="90" cy="58" r="4" fill="#60a5fa"/>
      <text x="95" y="48" font-size="10" fill="#60a5fa">(5, 14)</text>
      <text x="200" y="85" font-size="10" fill="#60a5fa">y = 3x − 1, наклон везде 3</text>
    </svg>
    <p class="caption">Прямая y = 3x − 1: наклон (производная) во всех точках равен 3.</p>
  </div>
  <div class="chart">
    <svg viewBox="0 0 320 240" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <lineargradient id="parabola" x1="0%" y1="100%" x2="0%" y2="0%">
          <stop offset="0%" stop-color="#4ade80" stop-opacity="0.3"/>
          <stop offset="100%" stop-color="#4ade80" stop-opacity="0"/>
        </lineargradient>
      </defs>
      <!-- координатная сетка -->
      <g stroke="#333" stroke-width="0.5" opacity="0.6">
        <line x1="60" y1="20" x2="60" y2="220"/>
        <line x1="60" y1="120" x2="300" y2="120"/>
        <line x1="60" y1="60" x2="295" y2="60"/>
        <line x1="60" y1="180" x2="295" y2="180"/>
        <line x1="140" y1="20" x2="140" y2="220"/>
        <line x1="220" y1="20" x2="220" y2="220"/>
      </g>
      <!-- оси -->
      <g stroke="#666" stroke-width="1" fill="none">
        <line x1="60" y1="20" x2="60" y2="220"/>
        <line x1="60" y1="120" x2="300" y2="120"/>
      </g>
      <!-- парабола y = x²: px = 60+65*x, py = 180-18*y -->
      <path d="M 60 180 L 92 171 L 125 162 L 158 140 L 190 108 L 223 68 L 255 18" 
            fill="none" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- касательная y = 4x - 4 в точке (2,4): через (1,0) и (3,8) -->
      <line x1="125" y1="180" x2="270" y2="36" stroke="#f97316" stroke-width="2" stroke-dasharray="5 4"/>
      <!-- точка (2, 4) -->
      <circle cx="190" cy="108" r="5" fill="#f97316"/>
      <!-- подписи -->
      <text x="305" y="125" font-size="11" fill="#888">x</text>
      <text x="45" y="25" font-size="11" fill="#888">y</text>
      <text x="175" y="125" font-size="10" fill="#f97316">(2, 4)</text>
      <text x="235" y="55" font-size="10" fill="#f97316">касательная, наклон 4</text>
      <text x="215" y="25" font-size="10" fill="#4ade80">y = x²</text>
    </svg>
    <p class="caption">y = x² и касательная в точке (2, 4). Производная f'(2) = 4 — это наклон прямой.</p>
  </div>
</body>
</html>
